<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset=".42" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".42" r=".62">
      <stop offset="0" stop-color="#F97316" stop-opacity=".55"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- fundo escuro arredondado -->
  <rect width="512" height="512" rx="128" fill="#0A0A0F"/>
  <rect width="512" height="512" rx="128" fill="url(#glow)"/>
  <!-- 3 cards empilhados -->
  <rect x="214" y="118" width="150" height="210" rx="42" fill="url(#card)" opacity=".30"/>
  <rect x="176" y="150" width="150" height="210" rx="42" fill="url(#card)" opacity=".60"/>
  <!-- sombra do card da frente -->
  <rect x="138" y="192" width="150" height="210" rx="42" fill="#EA580C" opacity=".38"/>
  <!-- card da frente + gloss -->
  <rect x="138" y="182" width="150" height="210" rx="42" fill="url(#card)"/>
  <rect x="138" y="182" width="150" height="210" rx="42" fill="url(#gloss)"/>
</svg>
